services:
  - type: web
    name: bhapi
    runtime: python
    buildCommand: pip install -e ".[postgres]" && cd dashboard && npm ci && npm run build
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: NODE_VERSION
        value: "20"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bhapi-db
          property: connectionURI
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        value: bhapi-inc
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: bhapi-db
    plan: free
    databaseName: bhapi
    user: bhapi
